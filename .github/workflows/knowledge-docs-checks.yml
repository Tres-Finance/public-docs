name: knowledge-docs-checks

on:
  # Runs on EVERY PR (no path filter) so the required `checks` status is
  # always reported — a path-filtered required check would never run on a
  # non-knowledge-docs PR, blocking it from merging forever. The job below
  # already scopes its scan to knowledge-docs/ changes and passes cleanly
  # (empty scan) when a PR touches nothing under knowledge-docs/.
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect changed files under knowledge-docs/
        id: diff
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE" "$HEAD" -- 'knowledge-docs/**')"
          echo "$CHANGED"
          printf '%s\n' "$CHANGED" > /tmp/changed.txt

      - name: Secret/PII scan + md-only gate
        run: |
          set -euo pipefail
          mapfile -t FILES < /tmp/changed.txt
          # drop empty lines
          FILTERED=()
          for f in "${FILES[@]}"; do [ -n "$f" ] && FILTERED+=("$f"); done
          python3 scripts/ci_checks.py --changed "${FILTERED[@]}"
