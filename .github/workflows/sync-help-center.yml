name: Sync help-center

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-help-center
  cancel-in-progress: false

jobs:
  sync:
    # Tres self-hosted runner: Tres-Finance has an org IP allow list, so the
    # PAT-authenticated PR/auto-merge calls must originate from an allow-listed
    # IP. Only maintainers trigger this (schedule/dispatch), so there is no
    # untrusted-fork-PR code-execution risk from using a self-hosted runner.
    runs-on: default-runners-ubuntu22.04-arm64
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # Fine-grained PAT (contents + pull-requests write on public-docs)
          # so the pushed branch and PR are authored by a real identity. A PR
          # authored by the default GITHUB_TOKEN holds the knowledge-docs-checks
          # gate as action_required (never auto-runs), which would stall
          # auto-merge; a PAT-authored PR triggers the gate normally.
          token: ${{ secrets.PAT_FOR_TOKEN_PUBLIC_DOCS_GITHUB_ACTIONS_PR }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Fetch articles, update anchor, refresh index bullets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          RESULT="$(python3 scripts/plain_help_center.py)"
          echo "$RESULT"
          RESULT="$RESULT" python3 - <<'PY'
          import os, json
          from scripts.update_index import apply_to_index_file
          result = json.loads(os.environ["RESULT"])
          changed = sorted(set(result["added"]) | set(result["changed"]))
          # Only touch the index when articles were actually added/changed/removed.
          # apply_to_index_file rebuilds the whole ## help-center section (sorted),
          # so calling it on a no-op run would re-sort/normalize existing bullets
          # and churn a spurious index-only PR.
          if changed or result["deleted"]:
              apply_to_index_file("knowledge-docs/index.md", "knowledge-docs/help-center", changed)
          else:
              print("no article changes; index left untouched")
          PY

      - name: Open or update PR
        id: pr
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- knowledge-docs/)" ]; then
            echo "No changes — nothing to sync."
            echo "outcome=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="sync/help-center-$(date -u +%Y%m%d)"
          git config user.name  "tres-help-center-sync[bot]"
          git config user.email "tres-help-center-sync@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add knowledge-docs/
          git commit -m "chore(help-center): scheduled corpus sync"
          # Plain --force (not --force-with-lease): this branch is bot-owned and
          # runs are serialized by the concurrency group, so there is no
          # concurrent writer to clobber. --force-with-lease fails from a fresh
          # checkout (no remote-tracking ref) when a same-named branch lingers
          # from a prior merged PR.
          git push --force origin "$BRANCH"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          # Use the REST + GraphQL API directly (not `gh pr create`/`gh pr merge`):
          # on a fork, gh resolves the upstream parent to detect cross-fork PR
          # options, which can hit the parent org's IP allow list. REST scoped to
          # THIS repo never touches the parent, and works identically on the
          # canonical (non-fork) repo.
          EXISTING="$(gh api "repos/$GITHUB_REPOSITORY/pulls?head=$OWNER:$BRANCH&base=main&state=open")"
          PR_NODE="$(printf '%s' "$EXISTING" | jq -r '.[0].node_id // empty')"
          PR_URL="$(printf '%s' "$EXISTING" | jq -r '.[0].html_url // empty')"
          PR_NUM="$(printf '%s' "$EXISTING" | jq -r '.[0].number // empty')"
          if [ -z "$PR_NODE" ]; then
            CREATED="$(gh api -X POST "repos/$GITHUB_REPOSITORY/pulls" \
              -f title="chore(help-center): scheduled corpus sync" \
              -f head="$BRANCH" -f base="main" \
              -f body="Automated help-center sync. Merges automatically once the knowledge-docs checks pass.")"
            PR_NODE="$(printf '%s' "$CREATED" | jq -r '.node_id')"
            PR_URL="$(printf '%s' "$CREATED" | jq -r '.html_url')"
            PR_NUM="$(printf '%s' "$CREATED" | jq -r '.number')"
          fi
          # Record the PR before enabling auto-merge, so the Slack step reports it
          # even if enabling auto-merge fails (e.g. a still-pending required check).
          {
            echo "outcome=pr"
            echo "pr_url=$PR_URL"
            echo "pr_number=$PR_NUM"
          } >> "$GITHUB_OUTPUT"
          gh api graphql -f query='mutation($id:ID!){enablePullRequestAutoMerge(input:{pullRequestId:$id,mergeMethod:SQUASH}){pullRequest{number}}}' -F id="$PR_NODE"
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_TOKEN_PUBLIC_DOCS_GITHUB_ACTIONS_PR }}
          GH_REPO: ${{ github.repository }}

      - name: Notify Slack
        # Post the run result to the same channel the dashboard/internal-docs
        # wiki flow uses (the SLACK_WEBHOOK incoming webhook — the channel is
        # configured Slack-side). Plain curl + jq, no third-party action, per
        # the org policy. Runs regardless of outcome.
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          OUTCOME: ${{ steps.pr.outputs.outcome }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "::warning::SLACK_WEBHOOK not set — skipping Slack notification."
            exit 0
          fi
          case "${OUTCOME:-}" in
            noop)
              TEXT="✅ *help-center sync* ran — no changes (no-op). <$RUN_URL|View run>"
              ;;
            pr)
              TEXT="🔀 *help-center sync* opened a PR: <$PR_URL|#$PR_NUMBER>. <$RUN_URL|View run>"
              ;;
            *)
              TEXT="❌ *help-center sync* failed. <$RUN_URL|View run>"
              ;;
          esac
          PAYLOAD="$(jq -n --arg text "$TEXT" \
            '{text: $text, blocks: [{type: "section", text: {type: "mrkdwn", text: $text}}]}')"
          curl -fsSL -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"
          echo "Slack notified: ${OUTCOME:-failure}"
