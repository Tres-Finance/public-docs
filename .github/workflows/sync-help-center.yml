name: Sync help-center

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-help-center
  cancel-in-progress: false

jobs:
  sync:
    # Tres self-hosted runner: Tres-Finance has an org IP allow list, so the
    # PAT-authenticated PR/auto-merge calls must originate from an allow-listed
    # IP. Only maintainers trigger this (schedule/dispatch), so there is no
    # untrusted-fork-PR code-execution risk from using a self-hosted runner.
    runs-on: default-runners-ubuntu22.04-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          # Fine-grained PAT (contents + pull-requests write on public-docs)
          # so the pushed branch and PR are authored by a real identity. A PR
          # authored by the default GITHUB_TOKEN holds the knowledge-docs-checks
          # gate as action_required (never auto-runs), which would stall
          # auto-merge; a PAT-authored PR triggers the gate normally.
          token: ${{ secrets.PAT_FOR_TOKEN_PUBLIC_DOCS_GITHUB_ACTIONS_PR }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch articles, update anchor, refresh index bullets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          RESULT="$(python3 scripts/plain_help_center.py)"
          echo "$RESULT"
          RESULT="$RESULT" python3 - <<'PY'
          import os, json
          from scripts.update_index import apply_to_index_file
          result = json.loads(os.environ["RESULT"])
          changed = sorted(set(result["added"]) | set(result["changed"]))
          apply_to_index_file("knowledge-docs/index.md", "knowledge-docs/help-center", changed)
          PY

      - name: Open or update PR
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- knowledge-docs/)" ]; then
            echo "No changes — nothing to sync."
            exit 0
          fi
          BRANCH="sync/help-center-$(date -u +%Y%m%d)"
          git config user.name  "tres-help-center-sync[bot]"
          git config user.email "tres-help-center-sync@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add knowledge-docs/
          git commit -m "chore(help-center): scheduled corpus sync"
          # Plain --force (not --force-with-lease): this branch is bot-owned and
          # runs are serialized by the concurrency group, so there is no
          # concurrent writer to clobber. --force-with-lease fails from a fresh
          # checkout (no remote-tracking ref) when a same-named branch lingers
          # from a prior merged PR.
          git push --force origin "$BRANCH"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          # Use the REST + GraphQL API directly (not `gh pr create`/`gh pr merge`):
          # on a fork, gh resolves the upstream parent to detect cross-fork PR
          # options, which can hit the parent org's IP allow list. REST scoped to
          # THIS repo never touches the parent, and works identically on the
          # canonical (non-fork) repo.
          PR_NODE="$(gh api "repos/$GITHUB_REPOSITORY/pulls?head=$OWNER:$BRANCH&base=main&state=open" --jq '.[0].node_id // empty')"
          if [ -z "$PR_NODE" ]; then
            PR_NODE="$(gh api -X POST "repos/$GITHUB_REPOSITORY/pulls" \
              -f title="chore(help-center): scheduled corpus sync" \
              -f head="$BRANCH" -f base="main" \
              -f body="Automated help-center sync. Merges automatically once the knowledge-docs checks pass." \
              --jq '.node_id')"
          fi
          gh api graphql -f query='mutation($id:ID!){enablePullRequestAutoMerge(input:{pullRequestId:$id,mergeMethod:SQUASH}){pullRequest{number}}}' -F id="$PR_NODE"
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_TOKEN_PUBLIC_DOCS_GITHUB_ACTIONS_PR }}
          GH_REPO: ${{ github.repository }}
